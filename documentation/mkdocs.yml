site_name: Dokumentation
site_url: https://dietaube007.github.io/Projektarbeit_2026/
repo_url: https://github.com/dietaube007/Projektarbeit_2026
repo_name: dietaube007/Projektarbeit_2026

theme:
  name: material
  language: de
  favicon: assets/logo/petbuddy_logo_2.png
  logo: assets/logo/petbuddy_logo.png
  palette:
    - scheme: default
      primary: deep purple
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Dunkelmodus
    - scheme: slate
      primary: deep purple
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Hellmodus
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.html
  - Installation & Quickstart:
    - Übersicht: installation-quickstart/index.md
    - Voraussetzungen: installation-quickstart/voraussetzungen.md
    - Schritt-für-Schritt-Anleitung: installation-quickstart/anleitung.md
    - Konfiguration: installation-quickstart/konfiguration.md
    - Häufige Fehlerbilder: installation-quickstart/haeufige_fehlerbilder.md
  - Technische Dokumentation:
    - Übersicht: technische-dokumentation/index.md
    - Technische Strategie: technische-dokumentation/technische-strategie.md
    - Architekturdiagramm: technische-dokumentation/architekturdiagramm.md
    - Datenbankmodell: technische-dokumentation/datenbankmodell.md
    - Klassendiagramm: technische-dokumentation/klassendiagramm.md
    - API-Referenz: technische-dokumentation/api-referenz.md
    - Dateistruktur: technische-dokumentation/dateistruktur.md
    - Herausforderungen & Lösungen: technische-dokumentation/herausforderungen.md
  - Nutzungshandbuch: 
    - Übersicht: nutzungshandbuch/index.md
    - Registrierung & Anmeldung: nutzungshandbuch/registrierung_anmeldung.md
    - Entdecken & Suchen: nutzungshandbuch/entdecken_suchen.md
    - Meldung erstellen: nutzungshandbuch/meldung_erstellen.md
    - Kommentare: nutzungshandbuch/kommentare.md
    - Meine Meldungen: nutzungshandbuch/meine_meldungen.md
    - Favoriten & Gespeicherte Suchen: nutzungshandbuch/favoriten_gespeicherte_suchen.md
    - Profil bearbeiten: nutzungshandbuch/profil_bearbeiten.md
    - Einstellungen: nutzungshandbuch/einstellungen.md
    - Beispieldaten: nutzungshandbuch/beispieldaten.md